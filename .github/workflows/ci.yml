# This repo has no source code yet, so there is nothing to build or test.
# The workflows are the only executable code present, and they hold the
# GITHUB_TOKEN - so linting them is the one check that currently earns its keep.
# Add build/test jobs here alongside the first real code.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"

      # Installed from source at a pinned version rather than via a third-party
      # action, so the only external dependencies are official GitHub actions.
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run actionlint
        run: actionlint -color
